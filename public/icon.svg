<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Light background to match Library/Home -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfeff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="110" ry="110" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <!-- Multi character, scale 3.0, centered -->
  <g transform="translate(106 70) scale(3.0)">
    <!-- Legs + feet -->
    <rect x="37" y="86" width="9" height="16" rx="4.5" fill="#14532d"/>
    <rect x="54" y="86" width="9" height="16" rx="4.5" fill="#14532d"/>
    <ellipse cx="41.5" cy="104" rx="8" ry="3.5" fill="#422006"/>
    <ellipse cx="58.5" cy="104" rx="8" ry="3.5" fill="#422006"/>
    <!-- Body -->
    <ellipse cx="50" cy="50" rx="40" ry="44" fill="#22c55e"/>
    <ellipse cx="50" cy="62" rx="24" ry="26" fill="#86efac"/>
    <!-- Arms -->
    <rect x="8" y="52" width="16" height="9" rx="4.5" fill="#22c55e"/>
    <rect x="76" y="52" width="16" height="9" rx="4.5" fill="#22c55e"/>
    <!-- Eyes -->
    <ellipse cx="36" cy="42" rx="11" ry="12" fill="white"/>
    <ellipse cx="64" cy="42" rx="11" ry="12" fill="white"/>
    <circle cx="37" cy="44" r="5" fill="#0f172a"/>
    <circle cx="65" cy="44" r="5" fill="#0f172a"/>
    <circle cx="39" cy="42" r="1.6" fill="white"/>
    <circle cx="67" cy="42" r="1.6" fill="white"/>
    <!-- Cheeks -->
    <circle cx="22" cy="58" r="5" fill="#fb7185" fill-opacity="0.6"/>
    <circle cx="78" cy="58" r="5" fill="#fb7185" fill-opacity="0.6"/>
    <!-- Smile -->
    <path d="M 40 64 Q 50 74 60 64" stroke="#0f172a" stroke-width="3.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- × badge top-right -->
  <circle cx="418" cy="110" r="72" fill="#fbbf24" stroke="white" stroke-width="10"/>
  <path d="M 395 87 L 441 133 M 441 87 L 395 133" stroke="white" stroke-width="18" stroke-linecap="round"/>
</svg>
